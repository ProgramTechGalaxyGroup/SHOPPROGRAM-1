name = "shopprogram"
compatibility_date = "2026-05-18"
pages_build_output_dir = "."

# Cloudflare D1 binding for Pages Functions.
# Run once to create the database:
#   npx wrangler d1 create shopflow-db
# Then paste the printed database_id below and run:
#   npx wrangler d1 execute shopflow-db --file=./migrations/0001_init.sql --remote
#   npx wrangler d1 execute shopflow-db --file=./migrations/0002_seed.sql --remote
[[d1_databases]]
binding       = "DB"
database_name = "shopflow-db"
database_id   = "a28d28ab-cc97-4ddc-8388-cfb4274983c1"
